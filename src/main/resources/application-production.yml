spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL8Dialect

  # Flyway migration
  flyway:
    enabled: true
    validate-on-migrate: false
    baseline-on-migrate: true

  # Brevo SMTP (Sendinblue)
  mail:
    default-encoding: UTF-8
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000

server:
  port: ${PORT:8080}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: OFF

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: 900000
    refresh-expiration-ms: 2592000000
  frontend-url: ${FRONTEND_URL:https://fotori.vercel.app}
  backend-url: ${BACKEND_URL:https://fotori-production.up.railway.app/api}

