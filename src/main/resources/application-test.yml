spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  h2:
    console:
      enabled: true

  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8082

app:
  jwt:
    secret: test-secret-key-for-development-only-not-for-production-use
    access-expiration-ms: 900000
    refresh-expiration-ms: 2592000000

  firebase:
    enabled: false

logging:
  level:
    org.springframework.security: DEBUG

  h2:
    console:
      enabled: true